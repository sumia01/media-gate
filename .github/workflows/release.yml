name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run generate:api
          npm run build

      - name: Copy frontend dist to backend embed location
        run: |
          rm -rf backend/frontend/dist
          cp -r frontend/dist backend/frontend/dist

      # ── Go ────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Go generate
        working-directory: backend
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          go generate ./...

      # ── Cross-compile ─────────────────────────────────────────
      - name: Build binaries
        working-directory: backend
        run: |
          mkdir -p ../dist

          VERSION="${{ github.ref_name }}"
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "-X main.version=$VERSION" -o ../dist/media-gate-linux-amd64       ./cmd/server/
          # CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags "-X main.version=$VERSION" -o ../dist/media-gate-darwin-arm64       ./cmd/server/
          # CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-X main.version=$VERSION" -o ../dist/media-gate-windows-amd64.exe ./cmd/server/

      # ── GitHub Release ────────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/media-gate-linux-amd64
            # dist/media-gate-darwin-arm64
            # dist/media-gate-windows-amd64.exe

      # ── Sync deploy script to public Gist ─────────────────────
      - name: Update deploy script gist
        uses: popsiclestick/gist-sync-action@v1.2.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gist_url: https://gist.github.com/sumia01/1bdddb0df0709950c7a11d78e269b02d
          gist_title: media-gate-lxc-install.sh
          github_file: deploy/proxmox-lxc.sh
