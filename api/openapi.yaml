openapi: "3.0.3"
info:
  title: Media Gate API
  version: 0.1.0
  description: Self-hosted media management API

servers:
  - url: /api/v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the service
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/me:
    get:
      operationId: getMyProfile
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMyProfile
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/change-password:
    post:
      operationId: changePassword
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid request (wrong old password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                required:
                  - users
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserProfile"
    post:
      operationId: registerUser
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      operationId: deleteUser
      summary: Delete a user
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries:
    post:
      operationId: createLibrary
      summary: Create a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listLibraries
      summary: List all libraries
      responses:
        "200":
          description: List of libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"

  /libraries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getLibrary
      summary: Get a library by ID
      responses:
        "200":
          description: Library found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLibrary
      summary: Update a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLibrary
      summary: Delete a library
      responses:
        "204":
          description: Library deleted
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /browse:
    get:
      operationId: browseFolder
      summary: Browse directories within basePath
      description: Lists subdirectories of the given path (or basePath if omitted) for folder selection
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute path to browse. Defaults to the configured basePath.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResponse"
        "400":
          description: Invalid path or access error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/scan:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: scanLibrary
      summary: Scan library directory contents
      description: Lists the immediate children (files and directories) of the library path
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "400":
          description: Scan failed (e.g. path not accessible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/media:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaItems
      summary: List media items in a library
      responses:
        "200":
          description: Media items list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaItem"
                  total:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addMediaToLibrary
      summary: Add media to a library by external ID
      description: Creates a requested media item with metadata from TMDB/TVDB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMediaRequest"
      responses:
        "201":
          description: Media item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Media already exists in this library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/search:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: searchMediaForLibrary
      summary: Search external sources for media to add
      description: Searches TMDB/TVDB based on library media type and indicates which results already exist in the library
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/sync:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerSync
      summary: Trigger a library sync
      responses:
        "202":
          description: Sync job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library is already syncing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerMatch
      summary: Trigger metadata matching for a library
      parameters:
        - name: fullRematch
          in: query
          required: false
          schema:
            type: boolean
          description: If true, re-matches all items (including already matched). Default is false (unmatched only).
      responses:
        "202":
          description: Match job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library already has an active match job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/external-ids:
    get:
      operationId: getMediaExternalIds
      tags:
        - media
      summary: List source and external ID pairs for all library media items
      responses:
        "200":
          description: External ID list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - source
                        - externalId
                        - mediaItemId
                      properties:
                        source:
                          type: string
                        externalId:
                          type: integer
                        mediaItemId:
                          type: integer

  /media/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getMediaItem
      summary: Get a media item by ID
      responses:
        "200":
          description: Media item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMediaItem
      summary: Update a media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemUpdate"
      responses:
        "200":
          description: Media item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMediaItem
      summary: Delete a media item
      description: >-
        Fully deletes a media item: removes torrents from qBittorrent (with files),
        deletes imported library files and empty parent directories, removes the poster,
        and cascade-deletes all associated DB records.
      responses:
        "204":
          description: Media item deleted
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/resync:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: resyncMediaItem
      summary: Re-scan files for a media item
      description: Re-parses all files belonging to this media item, updating quality, resolution, source type, and season/episode info
      responses:
        "200":
          description: Resync complete
          content:
            application/json:
              schema:
                type: object
                required:
                  - updated
                  - added
                  - removed
                properties:
                  updated:
                    type: integer
                  added:
                    type: integer
                  removed:
                    type: integer
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/files:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaFiles
      summary: List files for a media item
      responses:
        "200":
          description: Media files list
          content:
            application/json:
              schema:
                type: object
                required:
                  - files
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaFile"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/episodes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaEpisodes
      summary: List episodes for a series media item
      description: Returns episode data grouped by season with file presence and monitor status
      responses:
        "200":
          description: Episodes grouped by season
          content:
            application/json:
              schema:
                type: object
                required:
                  - seasons
                properties:
                  seasons:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeasonSummary"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/season-monitors:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listSeasonMonitors
      summary: List season monitors for a series
      responses:
        "200":
          description: Season monitor list
          content:
            application/json:
              schema:
                type: object
                required:
                  - monitors
                properties:
                  monitors:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeasonMonitor"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/season-monitors/{seasonNumber}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: seasonNumber
        in: path
        required: true
        schema:
          type: integer
    put:
      operationId: updateSeasonMonitor
      summary: Set monitoring status for a season
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - monitored
              properties:
                monitored:
                  type: boolean
      responses:
        "200":
          description: Season monitor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonMonitor"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/episodes/{seasonNumber}/{episodeNumber}/monitor:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: seasonNumber
        in: path
        required: true
        schema:
          type: integer
      - name: episodeNumber
        in: path
        required: true
        schema:
          type: integer
    put:
      operationId: updateEpisodeMonitor
      summary: Set monitoring status for a specific episode
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - monitored
              properties:
                monitored:
                  type: boolean
      responses:
        "200":
          description: Episode monitor updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - monitored
                properties:
                  monitored:
                    type: boolean
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/search:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: searchMediaCandidates
      summary: Search external sources for match candidates
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query (defaults to media item title)
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum:
              - tmdb
              - tvdb
          description: Source to search (defaults to primary source setting)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: manualMatch
      summary: Manually match a media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMatchRequest"
      responses:
        "200":
          description: Media item matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unmatchMedia
      summary: Remove match from a media item
      responses:
        "200":
          description: Match removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      summary: List all jobs
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobs
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"

  /settings:
    get:
      operationId: listSettings
      summary: List all settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"

  /settings/test-tmdb:
    post:
      operationId: testTmdbConnection
      summary: Test TMDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-tvdb:
    post:
      operationId: testTvdbConnection
      summary: Test TVDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-qbittorrent:
    post:
      operationId: testQbittorrentConnection
      summary: Test qBittorrent connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QbittorrentTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-flaresolverr:
    post:
      operationId: testFlaresolverrConnection
      summary: Test FlareSolverr connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlareSolverrTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-discord:
    post:
      operationId: testDiscordConnection
      summary: Test Discord webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscordTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /search:
    get:
      operationId: globalSearch
      summary: Search external sources for media
      description: Searches TMDB/TVDB for movies or series globally (not scoped to a library)
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: mediaType
          in: query
          required: true
          schema:
            type: string
            enum:
              - movie
              - series
          description: Media type to search for
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"

  /search/{source}/{externalId}:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          type: string
          enum:
            - tmdb
            - tvdb
      - name: externalId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getExternalMediaDetail
      summary: Get external media details for preview
      description: Fetches full metadata from TMDB/TVDB for an external media item without creating any database records
      parameters:
        - name: mediaType
          in: query
          required: true
          schema:
            type: string
            enum:
              - movie
              - series
          description: Media type (needed to call the correct TMDB endpoint)
      responses:
        "200":
          description: External media detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMediaDetail"

  /search/{source}/{externalId}/episodes:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          type: string
          enum:
            - tmdb
            - tvdb
      - name: externalId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getExternalEpisodes
      summary: Get episode list from external source
      description: Fetches season/episode data from TMDB/TVDB without creating any database records
      parameters:
        - name: seasonCount
          in: query
          required: true
          schema:
            type: integer
          description: Number of seasons to fetch
      responses:
        "200":
          description: Episode list grouped by season
          content:
            application/json:
              schema:
                type: object
                required:
                  - seasons
                properties:
                  seasons:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExternalSeasonSummary"

  /discover/recently-added:
    get:
      operationId: getRecentlyAdded
      tags:
        - discover
