          format: int64
        name:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        mediaProfileId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LibraryCreate:
