components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: v1.2.0
        disk:
          type: object
          properties:
            totalBytes:
              type: integer
              format: int64
            usedBytes:
              type: integer
              format: int64
            freeBytes:
              type: integer
              format: int64

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string

    Library:
      type: object
      required:
        - id
        - name
        - path
        - mediaType
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        mediaProfileId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LibraryCreate:
      type: object
      required:
        - name
        - path
        - mediaType
      properties:
        name:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        mediaProfileId:
          type: integer
          format: int64

    ScanEntry:
      type: object
      required:
        - name
        - path
        - isDirectory
        - size
        - modifiedAt
      properties:
        name:
          type: string
        path:
          type: string
          description: Relative path within the library
        isDirectory:
          type: boolean
        size:
          type: integer
          format: int64
        modifiedAt:
          type: string
          format: date-time

    ScanResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScanEntry"

    BrowseResponse:
      type: object
      required:
        - path
        - entries
      properties:
        path:
          type: string
          description: The absolute path that was browsed
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScanEntry"

    MediaItem:
      type: object
      required:
        - id
        - libraryId
        - title
        - mediaType
        - status
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        libraryId:
          type: integer
          format: int64
        title:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        status:
          type: string
          enum:
            - new
            - requested
            - partial
            - available
            - missing
        source:
          type: string
          enum:
            - disk
            - request
        year:
          type: integer
        mediaProfileId:
          type: integer
          format: int64
        monitored:
          type: boolean
        monitorNewSeasons:
          type: boolean
        monitorSearchStartedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
