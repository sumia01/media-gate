openapi: "3.0.3"
info:
  title: Media Gate API
  version: 0.1.0
  description: Self-hosted media management API

servers:
  - url: /api/v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the service
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /libraries:
    post:
      operationId: createLibrary
      summary: Create a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listLibraries
      summary: List all libraries
      responses:
        "200":
          description: List of libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"

  /libraries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getLibrary
      summary: Get a library by ID
      responses:
        "200":
          description: Library found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLibrary
      summary: Update a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLibrary
      summary: Delete a library
      responses:
        "204":
          description: Library deleted
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /browse:
    get:
      operationId: browseFolder
      summary: Browse directories within basePath
      description: Lists subdirectories of the given path (or basePath if omitted) for folder selection
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute path to browse. Defaults to the configured basePath.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResponse"
        "400":
          description: Invalid path or access error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/scan:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: scanLibrary
      summary: Scan library directory contents
      description: Lists the immediate children (files and directories) of the library path
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "400":
          description: Scan failed (e.g. path not accessible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/media:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaItems
      summary: List media items in a library
      responses:
        "200":
          description: Media items list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaItem"
                  total:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/sync:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerSync
      summary: Trigger a library sync
      responses:
        "202":
          description: Sync job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library is already syncing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerMatch
      summary: Trigger metadata matching for a library
      responses:
        "202":
          description: Match job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library already has an active match job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/search:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: searchMediaCandidates
      summary: Search external sources for match candidates
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query (defaults to media item title)
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum:
              - tmdb
              - tvdb
          description: Source to search (defaults to primary source setting)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: manualMatch
      summary: Manually match a media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMatchRequest"
      responses:
        "200":
          description: Media item matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unmatchMedia
      summary: Remove match from a media item
      responses:
        "200":
          description: Match removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      summary: List all jobs
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobs
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"

  /settings:
    get:
      operationId: listSettings
      summary: List all settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Setting"
    put:
      operationId: updateSettings
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Setting"

  /settings/test-tmdb:
    post:
      operationId: testTmdbConnection
      summary: Test TMDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-tvdb:
    post:
      operationId: testTvdbConnection
      summary: Test TVDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string

    Library:
      type: object
      required:
        - id
        - name
        - path
        - mediaType
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LibraryCreate:
      type: object
      required:
        - name
        - path
        - mediaType
      properties:
        name:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series

    ScanEntry:
      type: object
      required:
        - name
        - path
        - isDirectory
        - size
        - modifiedAt
      properties:
        name:
          type: string
        path:
          type: string
          description: Relative path within the library
        isDirectory:
          type: boolean
        size:
          type: integer
          format: int64
        modifiedAt:
          type: string
          format: date-time

    ScanResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScanEntry"

    BrowseResponse:
      type: object
      required:
        - path
        - entries
      properties:
        path:
          type: string
          description: The absolute path that was browsed
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScanEntry"

    MediaItem:
      type: object
      required:
        - id
        - libraryId
        - title
        - folderName
        - path
        - mediaType
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        libraryId:
          type: integer
          format: int64
        title:
          type: string
        folderName:
          type: string
        path:
          type: string
        mediaType:
          type: string
          enum:
            - movie
            - series
        status:
          type: string
          enum:
            - new
            - matched
            - missing
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
          $ref: "#/components/schemas/MediaMetadata"

    MediaMetadata:
      type: object
      required:
        - id
        - source
        - externalId
        - title
        - confidence
      properties:
        id:
          type: integer
          format: int64
        source:
          type: string
          enum:
            - tmdb
            - tvdb
        externalId:
          type: integer
        title:
          type: string
        overview:
          type: string
        posterPath:
          type: string
        genres:
          type: string
        year:
          type: integer
        rating:
          type: number
          format: float
        status:
          type: string
        runtime:
          type: integer
        seasons:
          type: integer
        confidence:
          type: number
          format: float

    MatchCandidate:
      type: object
      required:
        - source
        - externalId
        - title
        - confidence
      properties:
        source:
          type: string
          enum:
            - tmdb
            - tvdb
        externalId:
          type: integer
        title:
          type: string
        overview:
          type: string
        year:
          type: integer
        posterUrl:
          type: string
        confidence:
          type: number
          format: float

    ManualMatchRequest:
      type: object
      required:
        - source
        - externalId
      properties:
        source:
          type: string
          enum:
            - tmdb
            - tvdb
        externalId:
          type: integer

    Job:
      type: object
      required:
        - id
        - type
        - status
        - createdAt
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - sync_library
            - match_library
        libraryId:
          type: integer
          format: int64
        libraryName:
          type: string
        status:
          type: string
          enum:
            - pending
            - running
            - completed
            - failed
        progress:
          type: object
          properties:
            current:
              type: integer
            total:
              type: integer
            message:
              type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    Setting:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string
        sensitive:
          type: boolean

    SettingsUpdate:
      type: object
      required:
        - settings
      properties:
        settings:
          type: array
          items:
            type: object
            required:
              - key
              - value
            properties:
              key:
                type: string
              value:
                type: string

    ConnectionTestRequest:
      type: object
      properties:
        apiKey:
          type: string

    ConnectionTestResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        message:
          type: string
