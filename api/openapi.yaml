            - request
        year:
          type: integer
        mediaProfileId:
          type: integer
          format: int64
        monitorNewSeasons:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
