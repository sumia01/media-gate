openapi: "3.0.3"
info:
  title: Media Gate API
  version: 0.1.0
  description: Self-hosted media management API

servers:
  - url: /api/v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the service
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /libraries:
    post:
      operationId: createLibrary
      summary: Create a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listLibraries
      summary: List all libraries
      responses:
        "200":
          description: List of libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"

  /libraries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getLibrary
      summary: Get a library by ID
      responses:
        "200":
          description: Library found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLibrary
      summary: Update a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLibrary
      summary: Delete a library
      responses:
        "204":
          description: Library deleted
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /browse:
    get:
      operationId: browseFolder
      summary: Browse directories within basePath
      description: Lists subdirectories of the given path (or basePath if omitted) for folder selection
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute path to browse. Defaults to the configured basePath.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResponse"
        "400":
          description: Invalid path or access error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/scan:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: scanLibrary
      summary: Scan library directory contents
      description: Lists the immediate children (files and directories) of the library path
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "400":
          description: Scan failed (e.g. path not accessible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/media:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaItems
      summary: List media items in a library
      responses:
        "200":
          description: Media items list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaItem"
                  total:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addMediaToLibrary
      summary: Add media to a library by external ID
      description: Creates a requested media item with metadata from TMDB/TVDB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMediaRequest"
      responses:
        "201":
          description: Media item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Media already exists in this library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/search:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: searchMediaForLibrary
      summary: Search external sources for media to add
      description: Searches TMDB/TVDB based on library media type and indicates which results already exist in the library
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/sync:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerSync
      summary: Trigger a library sync
      responses:
        "202":
          description: Sync job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library is already syncing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /libraries/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: triggerMatch
      summary: Trigger metadata matching for a library
      parameters:
        - name: fullRematch
          in: query
          required: false
          schema:
            type: boolean
          description: If true, re-matches all items (including already matched). Default is false (unmatched only).
      responses:
        "202":
          description: Match job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Library already has an active match job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getMediaItem
      summary: Get a media item by ID
      responses:
        "200":
          description: Media item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMediaItem
      summary: Update a media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemUpdate"
      responses:
        "200":
          description: Media item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMediaItem
      summary: Delete a media item
      description: Deletes a requested media item and its metadata. Only items with source "request" can be deleted.
      responses:
        "204":
          description: Media item deleted
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot delete non-requested media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/resync:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: resyncMediaItem
      summary: Re-scan files for a media item
      description: Re-parses all files belonging to this media item, updating quality, resolution, source type, and season/episode info
      responses:
        "200":
          description: Resync complete
          content:
            application/json:
              schema:
                type: object
                required:
                  - updated
                  - added
                  - removed
                properties:
                  updated:
                    type: integer
                  added:
                    type: integer
                  removed:
                    type: integer
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/files:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaFiles
      summary: List files for a media item
      responses:
        "200":
          description: Media files list
          content:
            application/json:
              schema:
                type: object
                required:
                  - files
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaFile"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/episodes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listMediaEpisodes
      summary: List episodes for a series media item
      description: Returns episode data grouped by season with file presence and monitor status
      responses:
        "200":
          description: Episodes grouped by season
          content:
            application/json:
              schema:
                type: object
                required:
                  - seasons
                properties:
                  seasons:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeasonSummary"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/search:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: searchMediaCandidates
      summary: Search external sources for match candidates
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query (defaults to media item title)
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum:
              - tmdb
              - tvdb
          description: Source to search (defaults to primary source setting)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/match:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: manualMatch
      summary: Manually match a media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMatchRequest"
      responses:
        "200":
          description: Media item matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unmatchMedia
      summary: Remove match from a media item
      responses:
        "200":
          description: Match removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Media item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      summary: List all jobs
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobs
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"

  /settings:
    get:
      operationId: listSettings
      summary: List all settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Setting"
    put:
      operationId: updateSettings
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                required:
                  - settings
                properties:
                  settings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Setting"

  /settings/test-tmdb:
    post:
      operationId: testTmdbConnection
      summary: Test TMDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-tvdb:
    post:
      operationId: testTvdbConnection
      summary: Test TVDB API connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /settings/test-qbittorrent:
    post:
      operationId: testQbittorrentConnection
      summary: Test qBittorrent connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QbittorrentTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /search:
    get:
      operationId: globalSearch
      summary: Search external sources for media
      description: Searches TMDB/TVDB for movies or series globally (not scoped to a library)
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: mediaType
          in: query
          required: true
          schema:
            type: string
            enum:
              - movie
              - series
          description: Media type to search for
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - candidates
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchCandidate"

  /search/{source}/{externalId}:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          type: string
          enum:
            - tmdb
            - tvdb
      - name: externalId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getExternalMediaDetail
      summary: Get external media details for preview
      description: Fetches full metadata from TMDB/TVDB for an external media item without creating any database records
      parameters:
        - name: mediaType
          in: query
          required: true
          schema:
            type: string
            enum:
              - movie
              - series
          description: Media type (needed to call the correct TMDB endpoint)
      responses:
        "200":
          description: External media detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMediaDetail"

  /media-profiles:
    get:
      operationId: listMediaProfiles
      summary: List all media profiles
      responses:
        "200":
          description: Media profiles list
          content:
            application/json:
              schema:
                type: object
                required:
                  - profiles
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaProfile"
    post:
      operationId: createMediaProfile
      summary: Create a media profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaProfileCreate"
      responses:
        "201":
          description: Media profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaProfile"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media-profiles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getMediaProfile
      summary: Get a media profile by ID
      responses:
        "200":
          description: Media profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaProfile"
        "404":
          description: Media profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMediaProfile
      summary: Update a media profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaProfileCreate"
      responses:
        "200":
          description: Media profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaProfile"
        "404":
          description: Media profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMediaProfile
      summary: Delete a media profile
      responses:
        "204":
          description: Media profile deleted
        "404":
          description: Media profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /indexer-definitions:
    get:
      operationId: listIndexerDefinitions
      summary: List available indexer definitions
      responses:
        "200":
          description: Indexer definitions list
          content:
            application/json:
              schema:
                type: object
                required:
                  - definitions
                properties:
                  definitions:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndexerDefinition"

  /indexer-definitions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getIndexerDefinition
      summary: Get an indexer definition by ID
      responses:
        "200":
          description: Indexer definition found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerDefinition"
        "404":
          description: Indexer definition not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /indexers:
    get:
      operationId: listIndexers
      summary: List all configured indexers
      responses:
        "200":
          description: Indexers list
          content:
            application/json:
              schema:
                type: object
                required:
                  - indexers
                properties:
                  indexers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Indexer"
    post:
      operationId: createIndexer
      summary: Create an indexer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerCreate"
      responses:
        "201":
          description: Indexer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /indexers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getIndexer
      summary: Get an indexer by ID
      responses:
        "200":
          description: Indexer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "404":
          description: Indexer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateIndexer
      summary: Update an indexer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerUpdate"
      responses:
        "200":
          description: Indexer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "404":
          description: Indexer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteIndexer
      summary: Delete an indexer
      responses:
        "204":
          description: Indexer deleted
        "404":
          description: Indexer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /indexers/{id}/test:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: testIndexerConnection
      summary: Test an indexer connection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"
        "404":
          description: Indexer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /indexers/search:
    get:
      operationId: searchIndexers
      summary: Search across configured indexers
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query
        - name: imdbId
          in: query
          required: false
          schema:
            type: string
          description: IMDb ID to search for
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - search
              - tv-search
              - movie-search
          description: Search type
        - name: season
          in: query
          required: false
          schema:
            type: string
          description: Season number
        - name: episode
          in: query
          required: false
          schema:
            type: string
          description: Episode number
        - name: categories
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated category list
        - name: indexerIds
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated indexer ID list
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/TorrentResult"

  /downloads:
    get:
      operationId: listDownloads
      summary: List downloads
      parameters:
        - name: mediaItemId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by media item ID
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - downloading
              - downloaded
              - importing
              - seeding
              - completed
              - failed
          description: Filter by status
      responses:
        "200":
          description: Downloads list
          content:
            application/json:
              schema:
                type: object
                required:
                  - downloads
                properties:
                  downloads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Download"
    post:
      operationId: createDownload
      summary: Create a download record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadCreate"
      responses:
        "201":
          description: Download created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /downloads/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getDownload
      summary: Get a download by ID
      responses:
        "200":
          description: Download found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download"
        "404":
          description: Download not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDownloadStatus
      summary: Update download status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadStatusUpdate"
      responses:
        "200":
          description: Download updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download"
        "404":
          description: Download not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDownload
      summary: Delete a download
      parameters:
        - name: deleteFiles
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Also delete downloaded files from disk
      responses:
        "204":
          description: Download deleted
        "404":
          description: Download not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /downloads/{id}/files:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: listDownloadFiles
      summary: List files in a download's torrent
      responses:
        "200":
          description: Torrent file list
          content:
            application/json:
              schema:
                type: object
                required:
                  - files
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/TorrentFile"
        "404":
          description: Download not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
